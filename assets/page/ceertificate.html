<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <!-- font awesome -->
        <script src="https://kit.fontawesome.com/8b42185fc0.js" crossorigin="anonymous"></script>

        <!-- material design icon -->
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/@mdi/font@7.2.96/css/materialdesignicons.min.css"
        />

        <!-- font -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap"
            rel="stylesheet"
        />

        <!-- css -->
        <link rel="stylesheet" href="../css/certificatePage.css" />
        <title>Personal Portfolio</title>
    </head>
    <body>
        <nav>
            <a href="../../index.html">
                <i class="fa-solid fa-arrow-left-long fa-2xl"></i>
            </a>
        </nav>

        <section>
            <div class="modal hidden" id="modalSm">
                <div class="modal-body">
                    <button class="modal-close" id="modalClose">
                        <i class="fa-solid fa-xmark fa-2xl"></i>
                    </button>
                    <img src="" alt="" id="imgShow" class="certificate-show" />
                </div>
            </div>
            <div class="container">
                <h1 class="title">sertifikat</h1>
                <div class="certificate-group">
                    <div class="certificate-img">
                        <img
                            src="../img/cerfificate/certificate 1.png"
                            alt="certificate 1"
                            id="certificateImg"
                        />
                    </div>
                    <div class="certificate-img">
                        <img
                            src="../img/cerfificate/certificate 2.png"
                            alt="certificate 2"
                            id="certificateImg"
                        />
                    </div>
                    <div class="certificate-img">
                        <img
                            src="../img/cerfificate/certificate 3.png"
                            alt="certificate 3"
                            id="certificateImg"
                        />
                    </div>
                    <div class="certificate-img">
                        <img
                            src="../img/cerfificate/certificate 4.png"
                            alt="certificate 4"
                            id="certificateImg"
                        />
                    </div>
                </div>
            </div>
        </section>

        <!-- back to top start -->
        <button class="back-to-top-btn" id="backToTopBtn">
            <i class="fas fa-arrow-up"></i>
        </button>
        <!-- back to top end -->
        <script src="../js/script.js"></script>
    </body>
</html>
